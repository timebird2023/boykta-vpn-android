name: Build Boykta VPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check libXray.aar
        run: |
          mkdir -p app/libs
          if [ -f "app/libs/libXray.aar" ]; then
            echo "libXray.aar exists locally!"
          else
            echo "Downloading fallback libXray.aar..."
            curl -fL "https://github.com/2dust/v2rayNG/releases/download/1.8.3/libXray.aar" -o app/libs/libXray.aar || echo "Download skipped, building anyway"
          fi
          ls -lh app/libs/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Optional: Release APK (only when KEYSTORE_BASE64 secret is set) ──
      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
