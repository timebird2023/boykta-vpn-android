name: Build Boykta VPN APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download libXray.aar (from v2rayNG)
        run: |
          mkdir -p app/libs
          LIBXRAY_VERSION=$(curl -s https://api.github.com/repos/2dust/v2rayNG/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Using v2rayNG version: $LIBXRAY_VERSION"
          curl -L "https://github.com/2dust/v2rayNG/releases/download/${LIBXRAY_VERSION}/libXray.aar" -o app/libs/libXray.aar || curl -L "https://github.com/2dust/v2rayNG/releases/download/1.9.30/libXray.aar" -o app/libs/libXray.aar
          ls -lh app/libs/

      - name: Generate Gradle Wrapper & Make executable
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
