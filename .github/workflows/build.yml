name: Build Boykta VPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        # NOTE: Do NOT run `gradle wrapper --gradle-version X` here.
        # That overwrites the committed wrapper (8.11.1) with an older version.

      # libXray.aar is committed at app/libs/libXray.aar (from XTLS/libXray releases).
      # This step refreshes it to the latest XTLS release on every CI run so the
      # committed copy never goes stale. Remove this step to use the committed file as-is.
      - name: Refresh libXray.aar from XTLS/libXray latest release
        run: |
          mkdir -p app/libs
          LATEST=$(curl -sS https://api.github.com/repos/XTLS/libXray/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Downloading libXray.aar from XTLS/libXray $LATEST"
          curl -fL \
            "https://github.com/XTLS/libXray/releases/download/${LATEST}/libxray-android.zip" \
            -o /tmp/libxray-android.zip
          unzip -j /tmp/libxray-android.zip "libxray-android/libXray.aar" -d app/libs/
          ls -lh app/libs/libXray.aar

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Optional: Release APK (only when KEYSTORE_BASE64 secret is set) ──
      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
          KEYSTORE_FILE=/tmp/release.keystore ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
