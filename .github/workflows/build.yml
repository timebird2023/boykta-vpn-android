name: Build Boykta VPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        # NOTE: Do NOT run `gradle wrapper --gradle-version X` here.
        # That overwrites the committed wrapper (8.11.1) with an older version.

      - name: Download libXray.aar
        run: |
          mkdir -p app/libs
          LATEST=$(curl -sS https://api.github.com/repos/2dust/v2rayNG/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Fetching libXray.aar from v2rayNG $LATEST"
          curl -fL "https://github.com/2dust/v2rayNG/releases/download/${LATEST}/libXray.aar" \
            -o app/libs/libXray.aar \
          || curl -fL "https://github.com/2dust/v2rayNG/releases/download/1.9.30/libXray.aar" \
            -o app/libs/libXray.aar
          ls -lh app/libs/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Optional: Release APK (only when KEYSTORE_BASE64 secret is set) ──
      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: boykta-vpn-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
